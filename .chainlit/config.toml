[project]
user_env = []
session_timeout = 3600
user_session_timeout = 1296000
cache = false
persist_user_env = false
mask_user_env = false
allow_origins = ["*"]

[features]
unsafe_allow_html = false
latex = false
user_message_markdown = true
user_message_autoscroll = true
assistant_message_autoscroll = true
auto_tag_thread = true
edit_message = true
allow_thread_sharing = false
favorites = false

[features.spontaneous_file_upload]
    enabled = true
    accept = ["*/*"]
    max_files = 5
    max_size_mb = 50

[features.audio]
    enabled = false
    sample_rate = 24000

[UI]
name = "Dev Companion"
description = "AI-powered code review agent"
cot = "full"
confirm_new_chat = true
alert_style = "classic"
logo_file_url = "/public/logo.svg"
default_avatar_file_url = "/public/avatar.svg"
favicon = "/public/favicon.svg"
custom_css = "/public/custom.css"
hide_cot = false
show_readme_as_default = true
watermark = false

[UI.theme]
    default = "dark"
    [UI.theme.dark]
        background = "#0f1117"
        paper = "#1a1d2e"
        primary = "#6366f1"

[meta]
generated_by = "2.10.0"
